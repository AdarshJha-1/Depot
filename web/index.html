<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot</title>

    <script src="https://unpkg.com/htmx.org@2.0.7/dist/htmx.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 450px;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
        }

        h1 {
            text-align: center;
            margin-bottom: .5rem;
        }

        p {
            color: #666;
            text-align: center;
            margin-bottom: 2rem;
        }

        input[type=file] {
            width: 100%;
            margin-bottom: 1rem;
        }

        button {
            width: 100%;
            padding: .8rem;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background: #1d4ed8;
        }

        #result {
            margin-top: 2rem;
        }

        .result-card {
            border-top: 1px solid #ddd;
            padding-top: 1rem;
        }

        .result-card img {
            width: 100%;
            margin-top: 1rem;
            border-radius: 8px;
        }

        .result-card a {
            color: #2563eb;
            text-decoration: none;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Depot</h1>
        <p>Upload an image and get a shareable URL.</p>
        <form hx-post="/uploads" hx-encoding="multipart/form-data" hx-target="#result" hx-swap="innerHTML">
            <input type="file" name="img" accept="image/*" required>
            <button type="submit">
                Upload
            </button>
        </form>
        <div id="result"></div>
    </div>
</body>

</html>
